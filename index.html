document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

on:absolute; width:0; height:0; left:51.612%; top:24.419%; pointer-events:auto;\" sc-camel-on-mouse-enter=\"{{ onMarkerEnter }}\" sc-camel-on-mouse-leave=\"{{ onMarkerLeave }}\" data-id=\"andrews\" data-title=\"Andrews, TX\" data-text=\"Cipher Digital's Stingray site is a 250-acre high-performance computing (HPC) data center being built in Andrews, Texas. The 70 MW facility is fully pre-leased to Amazon Web Services (AWS).\">\n        <span style=\"position:absolute; top:0; left:0; width:24px; height:24px; margin:-12px 0 0 -12px; border-radius:50%; cursor:pointer;\"><\u002Fspan>\n        <span class=\"om-ring\" style=\"position:absolute; top:0; left:0; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; border:1px solid rgba(255,255,255,0.9); animation:pulse 3s ease-out infinite; animation-delay:1.1s;\"><\u002Fspan>\n        <span style=\"position:absolute; top:0; left:0; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; background:#fff; box-shadow:0 0 7px 2px rgba(255,255,255,0.85), 0 0 2px 1px rgba(0,0,0,0.35);\"><\u002Fspan>\n      <\u002Fspan>\n      <span style=\"position:absolute; width:0; height:0; left:51.495%; top:25.722%; pointer-events:auto;\" sc-camel-on-mouse-enter=\"{{ onMarkerEnter }}\" sc-camel-on-mouse-leave=\"{{ onMarkerLeave }}\" data-id=\"abilene\" data-title=\"Abilene, TX\" data-text=\"The Stargate AI data center in Abilene, Texas. Developed by Crusoe Energy on the Lancium Clean Campus, the flagship site spans approximately 1,000 acres. The multi-billion dollar facility—backed by OpenAI and Oracle.\">\n        <span style=\"position:absolute; top:0; left:0; width:24px; height:24px; margin:-12px 0 0 -12px; border-radius:50%; cursor:pointer;\"><\u002Fspan>\n        <span class=\"om-ring\" style=\"position:absolute; top:0; left:0; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; border:1px solid rgba(255,255,255,0.9); animation:pulse 3s ease-out infinite; animation-delay:2.2s;\"><\u002Fspan>\n        <span style=\"position:absolute; top:0; left:0; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; background:#fff; box-shadow:0 0 7px 2px rgba(255,255,255,0.85), 0 0 2px 1px rgba(0,0,0,0.35);\"><\u002Fspan>\n      <\u002Fspan>\n      <span style=\"position:absolute; width:0; height:0; left:50.548%; top:25.196%; pointer-events:auto;\" sc-camel-on-mouse-enter=\"{{ onMarkerEnter }}\" sc-camel-on-mouse-leave=\"{{ onMarkerLeave }}\" data-id=\"dickens\" data-title=\"Dickens County, TX\" data-text=\"Galaxy's Helios is a massive, energy-dense data center campus in Dickens County, West Texas, dedicated to artificial intelligence and high-performance computing. Spanning over 2,200 acres, it is undergoing a transformation from a former cryptocurrency mining site to a premier AI facility backed by over 1.6 gigawatts of approved grid capacity.\">\n        <span style=\"position:absolute; top:0; left:0; width:24px; height:24px; margin:-12px 0 0 -12px; border-radius:50%; cursor:pointer;\"><\u002Fspan>\n        <span class=\"om-ring\" style=\"position:absolute; top:0; left:0; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; border:1px solid rgba(255,255,255,0.9); animation:pulse 3s ease-out infinite; animation-delay:0.8s;\"><\u002Fspan>\n        <span style=\"position:absolute; top:0; left:0; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; background:#fff; box-shadow:0 0 7px 2px rgba(255,255,255,0.85), 0 0 2px 1px rgba(0,0,0,0.35);\"><\u002Fspan>\n      <\u002Fspan>\n      <span style=\"position:absolute; width:0; height:0; left:43.624%; top:25.559%; pointer-events:auto;\" sc-camel-on-mouse-enter=\"{{ onMarkerEnter }}\" sc-camel-on-mouse-leave=\"{{ onMarkerLeave }}\" data-id=\"nm\" data-title=\"Santa Teresa, NM\" data-text=\"Project Jupiter is a $165 billion artificial intelligence data center being built in Santa Teresa, New Mexico, just outside El Paso, Texas. Backed by tech giants OpenAI and Oracle, it forms a key part of the national Stargate Project to rapidly expand AI infrastructure.\">\n        <span style=\"position:absolute; top:0; left:0; width:24px; height:24px; margin:-12px 0 0 -12px; border-radius:50%; cursor:pointer;\"><\u002Fspan>\n        <span class=\"om-ring\" style=\"position:absolute; top:0; left:0; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; border:1px solid rgba(255,255,255,0.9); animation:pulse 3s ease-out infinite; animation-delay:1.4s;\"><\u002Fspan>\n        <span style=\"position:absolute; top:0; left:0; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; background:#fff; box-shadow:0 0 7px 2px rgba(255,255,255,0.85), 0 0 2px 1px rgba(0,0,0,0.35);\"><\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div style=\"{{ tooltipStyle }}\">\n  <div style=\"font-weight:700; color:{{ accentColor }}; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.06em; font-size:11px;\">{{ tooltipTitle }}<\u002Fdiv>\n  {{ tooltipText }}\n<\u002Fdiv>\n\n<div style=\"position:fixed; inset:0; z-index:2; pointer-events:none; background:linear-gradient(225deg, rgba(1,1,3,0.1) 25%, rgba(1,1,3,0.65) 60%, rgba(1,1,3,0.92) 100%), radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.6) 100%);\"><\u002Fdiv>\n\n<svg style=\"position:fixed; inset:0; z-index:3; pointer-events:none; opacity:0.03; mix-blend-mode:overlay;\" width=\"100%\" height=\"100%\">\n  <filter id=\"noiseFilter\">\n    <feTurbulence type=\"fractalNoise\" sc-camel-base-frequency=\"0.85\" sc-camel-num-octaves=\"2\" sc-camel-stitch-tiles=\"stitch\"><\u002FfeTurbulence>\n    <feColorMatrix type=\"saturate\" values=\"0\"><\u002FfeColorMatrix>\n  <\u002Ffilter>\n  <rect width=\"100%\" height=\"100%\" filter=\"url(#noiseFilter)\"><\u002Frect>\n<\u002Fsvg><div class=\"om-content\" style=\"position: fixed; inset: 0; z-index: 4; display: flex; align-items: flex-end; justify-content: flex-start; padding: 2vh clamp(20px,6vw,80px) 6vh; pointer-events:none;\">\n  <div class=\"om-copy\" style=\"max-width:620px; width:100%; text-align:{{ copyAlign }}; pointer-events:none;\">\n\n    <div class=\"om-eyebrow\" style=\"font-size:11px; letter-spacing:0.2em; text-transform:uppercase; display:flex; align-items:center; justify-content:{{ contentJustify }}; gap:10px; margin-bottom:16px; text-shadow:0 1px 10px rgba(0,0,0,0.7); {{ eyebrowStyle }}\">Free report<\u002Fdiv>\n\n    <h1 style=\"{{ headlineStyle }}\">The same megawatt is worth <span style=\"{{ figStyle }}\">$95<\u002Fspan> mining bitcoin, or <span style=\"{{ figStyle }}\">$3,854<\u002Fspan> renting to AI.<\u002Fh1>\n\n    <p class=\"om-sub\" style=\"{{ subStyle }}\">Same building. Same power contract. 40x the revenue. Our free report breaks down the math across CLSK, MARA, RIOT, HUT, IREN, CIFR, and GLXY.<\u002Fp>\n\n    <ul class=\"om-points\" style=\"list-style:none; margin:0 auto clamp(22px,3.2vh,30px) 0; max-width:400px; display:grid; gap:9px;\">\n    <\u002Ful>\n\n    <sc-if value=\"{{ !submitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <form class=\"om-form\" style=\"display:flex; gap:10px; margin-right:auto; pointer-events:auto;\" sc-camel-on-submit=\"{{ handleSubmit }}\">\n        <label for=\"om-email\" style=\"position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0);\">Email address<\u002Flabel>\n        <input type=\"email\" id=\"om-email\" name=\"email\" placeholder=\"you@company.com\" required=\"true\" sc-camel-auto-complete=\"email\" style=\"flex:1; min-width:0; background:rgba(4,6,10,0.55); border:1px solid rgba(240,242,247,0.16); color:#f0f2f7; font-family:'IBM Plex Mono', monospace; font-size:13px; padding:14px 15px; border-radius:10px; backdrop-filter:blur(12px);\">\n        <button type=\"submit\" style=\"font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:13.5px; color:#0a0e18; background:{{ buttonGradient }}; border:none; padding:14px 20px; border-radius:10px; cursor:pointer; white-space:nowrap; box-shadow:0 10px 26px -8px rgba(255,176,102,0.5);\" style-hover=\"transform:translateY(-1px); box-shadow:0 14px 30px -8px rgba(255,176,102,0.65);\" disabled=\"{{ submitDisabled }}\">{{ submitLabel }}<\u002Fbutton>\n      <\u002Fform>\n      <p style=\"{{ errorStyle }}\">{{ errorText }}<\u002Fp>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"om-success\" style=\"display:flex; align-items:center; justify-content:flex-start; gap:8px; padding:14px 16px; border-radius:10px; border:1px solid rgba(93,179,224,0.35); background:rgba(93,179,224,0.1); backdrop-filter:blur(12px); font-family:'IBM Plex Mono', monospace; font-size:12.5px; margin-right:auto; max-width:400px; pointer-events:auto;\">Sent. Check your inbox shortly.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <p style=\"margin:14px 0 0 0; max-width:400px; font-size:11px; font-weight:500; line-height:1.6; text-align:left; {{ finePrintStyle }}\">You'll also get <strong style=\"color:{{ inkColor }}; font-weight:700;\">Blockspace Daily<\u002Fstrong>. One email a day. Unsubscribe anytime.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:fixed; top:clamp(20px,4vh,36px); left:clamp(20px,4vw,44px); z-index:5; font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:14px; letter-spacing:0.14em; display:flex; align-items:center; gap:9px; text-shadow:0 1px 12px rgba(0,0,0,0.6);\">\n  <span style=\"width:6px; height:6px; border-radius:50%; background:{{ accentColor }}; box-shadow:0 0 8px 2px rgba(255,176,102,0.45);\"><\u002Fspan>BLOCKSPACE\n<\u002Fdiv>\n\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 900},\n  &quot;headlineFont&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Manrope&quot;, &quot;options&quot;: [&quot;Manrope&quot;, &quot;Space Grotesk&quot;, &quot;Playfair Display&quot;, &quot;Inter&quot;, &quot;IBM Plex Mono&quot;, &quot;Georgia&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Text design&quot;},\n  &quot;headlineWeight&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;700&quot;, &quot;options&quot;: [&quot;500&quot;, &quot;600&quot;, &quot;700&quot;, &quot;800&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Text design&quot;},\n  &quot;headlineSize&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 48, &quot;min&quot;: 24, &quot;max&quot;: 60, &quot;step&quot;: 1, &quot;unit&quot;: &quot;px&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Text design&quot;},\n  &quot;bodyFont&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Manrope&quot;, &quot;options&quot;: [&quot;Manrope&quot;, &quot;Inter&quot;, &quot;IBM Plex Mono&quot;, &quot;Georgia&quot;, &quot;Playfair Display&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Text design&quot;},\n  &quot;textAlign&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;left&quot;, &quot;options&quot;: [&quot;right&quot;, &quot;center&quot;, &quot;left&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Text design&quot;},\n  &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#ffb066&quot;, &quot;options&quot;: [&quot;#ffb066&quot;, &quot;#5db3e0&quot;, &quot;#8fd6a8&quot;, &quot;#e08fce&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Text design&quot;},\n  &quot;textColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#ffffff&quot;, &quot;options&quot;: [&quot;#ffffff&quot;, &quot;#fff4e6&quot;, &quot;#e8f4ff&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Text design&quot;}\n}\">\nclass Component extends DCLogic {\n  worldRef = React.createRef();\n  hiRef = React.createRef();\n  state = { hiLoaded: false, markersVisible: false, submitted: false, sending: false, errorMsg: null, tooltip: null };\n\n  onMarkerEnter = (e) => {\n    const r = e.currentTarget.getBoundingClientRect();\n    const { id, title, text } = e.currentTarget.dataset;\n    this.setState({ tooltip: { id, title, text, x: r.left + r.width / 2, y: r.top, visible: true } });\n  };\n  onMarkerLeave = () => {\n    this.setState((s) => (s.tooltip ? { tooltip: { ...s.tooltip, visible: false } } : s));\n  };\n\n  componentDidMount(){\n    this.layout();\n    window.addEventListener('resize', this.layout);\n    const hi = this.hiRef.current;\n    if (hi){\n      hi.onload = () => this.setState({ hiLoaded: true, markersVisible: true });\n      hi.onerror = () => this.setState({ markersVisible: true });\n      hi.src = 'https://svs.gsfc.nasa.gov/vis/a030000/a030000/a030002/npp.jpg';\n    }\n  }\n\n  componentWillUnmount(){\n    window.removeEventListener('resize', this.layout);\n  }\n\n  layout = () => {\n    const world = this.worldRef.current;\n    if (!world) return;\n    const vw = window.innerWidth, vh = window.innerHeight;\n    const isMobile = vw <= 640;\n    const zoom = isMobile ? 1.4 : 1.25;\n    const xf = (isMobile ? 48 : 55) / 100;\n    const yf = (isMobile ? 40 : 38) / 100;\n    const side = Math.max(vw, vh) * zoom * 1.08;\n    world.style.width = side + 'px';\n    world.style.height = side + 'px';\n    world.style.left = ((vw - side) * xf) + 'px';\n    world.style.top = ((vh - side) * yf) + 'px';\n  };\n\n  handleSubmit = async (e) => {\n    e.preventDefault();\n    if (this.state.sending) return;\n    const email = e.target.email.value.trim();\n    const page = new URLSearchParams(window.location.search);\n    this.setState({ sending: true, errorMsg: null });\n    try {\n      const r = await fetch('/api/subscribe', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify({\n          email,\n          utm_source: page.get('utm_source') || 'landing_page',\n          utm_medium: page.get('utm_medium') || 'paid_social',\n        }),\n      });\n      const data = await r.json().catch(() => ({}));\n      if (!r.ok) {\n        this.setState({ sending: false, errorMsg: data.error || 'Something went wrong — please try again.' });\n        return;\n      }\n      this.setState({ submitted: true, sending: false });\n    } catch (err) {\n      this.setState({ sending: false, errorMsg: 'Network error — please try again.' });\n    }\n  };\n\n  renderVals(){\n    const headlineFont = this.props.headlineFont ?? 'Manrope';\n    const headlineWeight = this.props.headlineWeight ?? '700';\n    const headlineSize = Number(this.props.headlineSize ?? 48);\n    const bodyFont = this.props.bodyFont ?? 'Manrope';\n    const accent = this.props.accentColor ?? '#ffb066';\n    const ink = this.props.textColor ?? '#ffffff';\n    const align = this.props.textAlign ?? 'left';\n\n    const inkDim = `color-mix(in srgb, ${ink} 68%, black)`;\n    const inkFaint = `color-mix(in srgb, ${ink} 42%, black)`;\n    const headlineFontSize = `clamp(${Math.round(headlineSize * 0.68)}px, 2.6vw, ${headlineSize}px)`;\n    const contentJustify = align === 'left' ? 'flex-start' : align === 'center' ? 'center' : 'flex-end';\n\n    return {\n      worldRef: this.worldRef,\n      hiRef: this.hiRef,\n      hiOpacity: this.state.hiLoaded ? 1 : 0,\n      markersOpacity: this.state.markersVisible ? 1 : 0,\n      submitted: this.state.submitted,\n      handleSubmit: this.handleSubmit,\n      submitLabel: this.state.sending ? 'Sending…' : 'Send me the report',\n      submitDisabled: this.state.sending,\n      errorText: this.state.errorMsg || '',\n      errorStyle: this.state.errorMsg\n        ? `display:block; margin:10px 0 0 0; max-width:400px; font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:#ff9d9d; text-shadow:0 1px 8px rgba(0,0,0,0.8);`\n        : 'display:none;',\n      onMarkerEnter: this.onMarkerEnter,\n      onMarkerLeave: this.onMarkerLeave,\n      tooltipTitle: this.state.tooltip ? this.state.tooltip.title : '',\n      tooltipText: this.state.tooltip ? this.state.tooltip.text : '',\n      tooltipStyle: this.state.tooltip ? `position:fixed; right:24px; bottom:24px; width:300px; padding:16px 18px; border-radius:10px; background:rgba(8,10,16,0.94); border:1px solid rgba(255,255,255,0.16); backdrop-filter:blur(10px); font-family:'Manrope', sans-serif; font-size:12.5px; line-height:1.5; color:#f0f2f7; box-shadow:0 16px 34px -8px rgba(0,0,0,0.65); transform:translateY(${this.state.tooltip.visible ? '0' : '6px'}); opacity:${this.state.tooltip.visible ? 1 : 0}; transition:opacity .18s ease, transform .18s ease; pointer-events:none; z-index:20;` : 'display:none;',\n      contentJustify,\n      copyAlign: align,\n      accentColor: accent,\n      inkColor: ink,\n      inkDimColor: inkDim,\n      headlineStyle: `font-family:'${headlineFont}', sans-serif; font-weight:${headlineWeight}; letter-spacing:-0.01em; line-height:1.05; font-size:${headlineFontSize}; margin-bottom:14px; color:${ink}; text-shadow:0 2px 24px rgba(0,0,0,0.8), 0 1px 3px rgba(0,0,0,0.6);`,\n      figStyle: `color:${accent}; font-variant-numeric:tabular-nums;`,\n      subStyle: `font-family:'${bodyFont}', sans-serif; font-weight:500; color:${ink}; font-size:clamp(1.1rem,1.5vw,1.3rem); line-height:1.55; margin-bottom:clamp(18px,2.6vh,24px); margin-right:auto; max-width:560px; text-shadow:0 1px 14px rgba(0,0,0,0.9), 0 1px 3px rgba(0,0,0,0.7);`,\n      pointStyle: `font-family:'${bodyFont}', sans-serif; color:${ink}; text-shadow:0 1px 12px rgba(0,0,0,0.9), 0 1px 3px rgba(0,0,0,0.7);`,\n      eyebrowStyle: `color:${accent}; font-family:'IBM Plex Mono', monospace;`,\n      finePrintStyle: `color:${ink}; font-family:'${bodyFont}', sans-serif;`,\n      buttonGradient: `linear-gradient(135deg, color-mix(in srgb, ${accent} 70%, white), ${accent})`,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
</script>
